bind 0.0.0.0
port 6379
protected-mode yes

# memory
maxmemory 8gb
maxmemory-policy allkeys-lru

# persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# security
requirepass CHANGE_ME_STRONG_PASSWORD
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# clients
timeout 300
tcp-keepalive 60