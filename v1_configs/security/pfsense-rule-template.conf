# pfSense Rule Template (conceptual export-style representation)
# Use this as baseline mapping before importing into pfSense UI/API

[rule_1]
name = Allow_HTTPS_Inbound
interface = WAN
protocol = TCP
source = any
destination = WAN_ADDRESS
destination_port = 443
action = pass
log = yes

[rule_2]
name = Allow_VPN_Inbound
interface = WAN
protocol = UDP
source = any
destination = WAN_ADDRESS
destination_port = 1194
action = pass
log = yes

[rule_3]
name = Deny_All_Other_Inbound
interface = WAN
protocol = any
source = any
destination = any
action = block
log = yes

[rule_4]
name = Allow_Internal_DNS
interface = LAN
protocol = UDP
source = LAN_NET
destination = DNS_SERVERS
destination_port = 53
action = pass
log = yes