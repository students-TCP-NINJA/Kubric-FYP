---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install baseline packages
  apt:
    name:
      - curl
      - jq
      - unzip
      - ca-certificates
      - gnupg
    state: present

- name: Ensure chrony is installed
  apt:
    name: chrony
    state: present

- name: Ensure chrony service is enabled
  service:
    name: chrony
    state: started
    enabled: true
